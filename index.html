<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watalappan Sales Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login">
<div class="card">
<h1>Watalappan Sales Pro</h1>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>Default: admin / admin123</p>
</div>
</div>

<div id="app" style="display:none">
<header>
<h1>Sales Dashboard</h1>
<button onclick="logout()">Logout</button>
</header>

<div class="grid">
<div class="card">
<h3>New Sale</h3>
<input type="date" id="date">
<select id="item"></select>
<select id="shop"></select>
<input id="qty" type="number" placeholder="Quantity">
<button onclick="saveSale()">Save Sale</button>
</div>

<div class="card">
<h3>Manage Shops</h3>
<input id="newShop" placeholder="Shop Name">
<button onclick="addShop()">Add Shop</button>
</div>

<div class="card">
<h3>Manage Prices</h3>
<div id="prices"></div>
</div>

<div class="card">
<h3>Summary</h3>
<p id="summary"></p>
<button onclick="downloadCSV()">Download CSV</button>
</div>
</div>

<div class="card">
<table>
<thead><tr><th>Date</th><th>Item</th><th>Shop</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
