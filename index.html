<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watalappan Sales Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginPage" class="center-card">
  <div class="card">
    <h1>Watalappan Sales</h1>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Demo Login: admin / 1234</p>
  </div>
</div>

<div id="appPage" style="display:none;">
<header>
<h1>Daily Sales Entry</h1>
<button onclick="logout()">Logout</button>
</header>

<div class="grid">
<div class="card">
<h3>Sales Entry</h3>
<label>Date</label>
<input id="date" type="date">

<label>Item</label>
<select id="item">
<option>Yogurt</option>
<option>Watalappan</option>
<option>Jelly Yogurt</option>
<option>Caramel Pudding</option>
</select>

<label>Shop</label>
<select id="shop"></select>

<input id="newShop" placeholder="New Shop Name">
<button onclick="addShop()">Add Shop</button>

<label>Quantity</label>
<input id="qty" type="number">

<button onclick="addSale()">Save Sale</button>
</div>

<div class="card">
<h3>Unit Prices</h3>
<label>Yogurt</label><input id="pYogurt" type="number" value="100">
<label>Watalappan</label><input id="pWatalappan" type="number" value="150">
<label>Jelly Yogurt</label><input id="pJelly Yogurt" type="number" value="120">
<label>Caramel Pudding</label><input id="pCaramel Pudding" type="number" value="180">
</div>
</div>

<div class="card">
<h3>Sales Records</h3>
<button onclick="downloadCSV()">Download Excel CSV</button>
<table>
<thead>
<tr>
<th>Date</th><th>Item</th><th>Shop</th><th>Qty</th><th>Unit Price</th><th>Total</th>
</tr>
</thead>
<tbody id="salesBody"></tbody>
</table>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
